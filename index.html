<!DOCTYPE html>
<html>
<head>
<title>Pro Dashboard Website</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
}

/* Hide dashboard initially */
#dashboard {
    display: none;
}

.box {
    padding: 20px;
    margin: 20px;
    border: 1px solid gray;
}
</style>

</head>
<body>

<h1>🚀 My Real Website</h1>

<!-- REGISTER -->
<div class="box">
<h2>Register</h2>
<input type="text" id="name" placeholder="Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="box">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email"><br>
<input type="password" id="loginPassword" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">
<h2>Dashboard</h2>
<p id="welcome"></p>

<h3>Update Profile</h3>
<input type="text" id="newName" placeholder="New Name"><br>
<button onclick="updateProfile()">Update</button>

<br><br>
<button onclick="logout()">Logout</button>
</div>

<script>

// 🔑 Firebase Config (अपना डालो)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

// Init
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Register
function register(){
    let name = name.value;
    let email = email.value;
    let password = password.value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
        let user = userCredential.user;

        // Save in Firestore
        db.collection("users").doc(user.uid).set({
            name: name,
            email: email
        });

        alert("Registered Successfully ✅");
    })
    .catch(err => alert(err.message));
}

// Login
function login(){
    let email = loginEmail.value;
    let password = loginPassword.value;

    auth.signInWithEmailAndPassword(email, password)
    .then(()=> alert("Login Success 🎉"))
    .catch(err=> alert(err.message));
}

// Auto Login Check
auth.onAuthStateChanged(user => {
    if(user){
        document.getElementById("dashboard").style.display = "block";

        // Get user data
        db.collection("users").doc(user.uid).get()
        .then(doc=>{
            document.getElementById("welcome").innerText =
            "Welcome " + doc.data().name;
        });

    } else {
        document.getElementById("dashboard").style.display = "none";
    }
});

// Update Profile
function updateProfile(){
    let user = auth.currentUser;
    let newName = newName.value;

    db.collection("users").doc(user.uid).update({
        name: newName
    });

    alert("Profile Updated 🔄");
}

// Logout
function logout(){
    auth.signOut();
    alert("Logged Out");
}

</script>

</body>
</html>
